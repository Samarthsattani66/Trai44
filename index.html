
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TEAMROHITOFFICIAL45</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>

body{
background:#0a0f1c;
font-family:system-ui;
color:white;
}

.match-tile{
background:#131d2f;
border-radius:28px;
border:1px solid #253247;
overflow:hidden;
transition:0.3s;
}

.match-tile:hover{
transform:translateY(-4px);
border-color:#3b82f6;
}

.img-wrapper{
height:210px;
overflow:hidden;
position:relative;
}

.match-img{
width:100%;
height:100%;
object-fit:cover;
}

.live-badge{
position:absolute;
top:10px;
left:10px;
background:#dc2626;
color:white;
font-size:12px;
padding:4px 10px;
border-radius:30px;
}

.btn-watch{
background:#2563eb;
padding:12px;
border-radius:40px;
display:block;
text-align:center;
font-weight:bold;
margin-top:10px;
}

.btn-watch:hover{
background:#1d4ed8;
}

</style>

</head>


<body class="p-5 max-w-7xl mx-auto">


<!-- HEADER -->

<div class="text-center mb-10">

<div class="inline-flex items-center gap-3 bg-[#131d2f] py-3 px-7 rounded-full border border-blue-900/50">

<i class="fas fa-bolt text-blue-500"></i>

<span class="text-3xl font-black">
TEAMROHITOFFICIAL45
</span>

</div>

<p class="text-gray-500 text-sm mt-3">
WEB BY @Cricinsider365
</p>

</div>


<!-- MATCH CONTAINER -->

<div id="matches-container"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
</div>


<script>

const DATA_URL =
"https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

const WATCH_BASE =
"https://teamrofemcodeplyr2.pages.dev/match.html?id=";

const container =
document.getElementById("matches-container");


fetch(DATA_URL)

.then(res=>res.json())

.then(data=>{

container.innerHTML="";

const matches = data.matches || [];

if(matches.length===0){

container.innerHTML=
"<p class='text-center col-span-3 text-gray-400'>No matches available</p>";

return;

}

matches.forEach(m=>{

const matchId =
m.match_id || m.id || "";

const isLive =
(m.status || "").toUpperCase() === "LIVE";

let img = m.image || "";

if(!img && m.image_cdn){

img =
m.image_cdn.APP ||
m.image_cdn.TATAPLAY ||
m.image_cdn.PLAYBACK ||
"";

}

if(!img){

img =
"https://www.fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg";

}

const title =
m.title || "Match";

const tournament =
m.tournament || "";

const time =
m.startTime || "";


const card =
document.createElement("div");

card.className="match-tile";


card.innerHTML=`

<div class="img-wrapper">

<img src="${img}" class="match-img">

${isLive ? '<span class="live-badge">LIVE</span>' : ''}

</div>

<div class="p-5">

<h3 class="font-bold text-lg">
${title}
</h3>

<p class="text-gray-400 text-sm mt-1">
${tournament}
</p>

<p class="text-gray-400 text-sm mt-1">
${time}
</p>

<a href="${WATCH_BASE+matchId}"
target="_blank"
class="btn-watch">

${isLive ?
'<i class="fas fa-play-circle"></i> WATCH LIVE'
:
'NOT LIVE'}

</a>

</div>

`;

container.appendChild(card);

});

})

.catch(()=>{

container.innerHTML=
"<p class='text-center col-span-3 text-gray-400'>Failed to load matches</p>";

});

</script>


</body>
</html>
