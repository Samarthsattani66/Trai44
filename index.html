<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Matches</title>

<style>

body{
background:#0f172a;
font-family:Arial, Helvetica, sans-serif;
margin:0;
padding:20px;
color:white;
}

h1{
text-align:center;
margin-bottom:25px;
}

#matches{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.5);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.match-title{
font-size:16px;
font-weight:bold;
margin-bottom:10px;
}

.watch-btn{
display:inline-block;
padding:8px 15px;
background:#ff3b3b;
color:white;
text-decoration:none;
border-radius:6px;
font-size:14px;
}

.watch-btn:hover{
background:#ff0000;
}

#nomatch{
text-align:center;
font-size:18px;
margin-top:40px;
display:none;
}

</style>
</head>

<body>

<h1>Live Matches</h1>

<div id="matches"></div>
<div id="nomatch">No match available</div>

<script>

// JSON DATA inside HTML
const matches = [
{
name:"CSK vs MI",
image:"https://via.placeholder.com/400x200",
stream:"https://example.com/stream1"
},
{
name:"India vs Australia",
image:"https://via.placeholder.com/400x200",
stream:"https://example.com/stream2"
}
];

const container = document.getElementById("matches");

if(matches.length === 0){
document.getElementById("nomatch").style.display="block";
}else{

matches.forEach(match=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${match.image}">
<div class="card-content">
<div class="match-title">${match.name}</div>
<a class="watch-btn" href="${match.stream}" target="_blank">Watch</a>
</div>
`;

container.appendChild(card);

});

}

</script>

</body>
</html>
