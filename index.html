<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAMROHITOFFICIAL45</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>

body{
background:#0a0f1c;
font-family:system-ui;
color:white;
}

.match-tile{
background:#131d2f;
border-radius:30px;
overflow:hidden;
border:1px solid #253247;
transition:0.3s;
}

.match-tile:hover{
transform:translateY(-4px);
border-color:#3b82f6;
}

.img-wrapper{
height:210px;
overflow:hidden;
}

.match-img{
width:100%;
height:100%;
object-fit:cover;
}

.live-badge{
background:#dc2626;
padding:4px 10px;
border-radius:30px;
font-size:12px;
position:absolute;
top:10px;
left:10px;
}

.btn-watch{
background:#2563eb;
padding:12px;
border-radius:40px;
text-align:center;
display:block;
margin-top:10px;
font-weight:bold;
}

.btn-watch:hover{
background:#1d4ed8;
}

</style>
</head>

<body class="p-5 max-w-7xl mx-auto">


<!-- HEADER -->

<div class="text-center mb-10">

<div class="inline-flex items-center gap-3 bg-[#131d2f] py-3 px-7 rounded-full border border-blue-900/50">

<i class="fas fa-bolt text-blue-500"></i>

<span class="text-3xl font-black">
TEAMROHITOFFICIAL45
</span>

</div>

<p class="text-gray-500 text-sm mt-3">
WEB BY @Cricinsider365
</p>

</div>



<!-- MATCHES -->

<div id="matches-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>



<script>

const DATA_URL="https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

const WATCH_BASE="https://teamrofemcodeplyr2.pages.dev/match.html?id=";



function actionButton(matchId,isLive){

if(isLive){

let a=document.createElement("a");

a.href=WATCH_BASE+matchId;

a.target="_blank";

a.className="btn-watch";

a.innerHTML='<i class="fas fa-play-circle"></i> WATCH LIVE';

return a;

}

else{

let div=document.createElement("div");

div.className="btn-watch";

div.style.opacity="0.4";

div.innerHTML="NOT LIVE";

return div;

}

}



fetch(DATA_URL)

.then(res=>res.json())

.then(data=>{

const container=document.getElementById("matches-container");

container.innerHTML="";

data.matches.forEach(m=>{

const isLive=m.status==="LIVE";

const matchId=m.match_id;

const card=document.createElement("div");

card.className="match-tile";



let img=m.image || "https://www.fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg";



card.innerHTML=`

<div class="img-wrapper relative">

<img src="${img}" class="match-img">

${isLive?'<span class="live-badge">LIVE</span>':''}

</div>

<div class="p-5">

<h3 class="font-bold text-lg">${m.title}</h3>

<p class="text-gray-400 text-sm mt-1">${m.tournament||""}</p>

<p class="text-gray-400 text-sm mt-1">${m.startTime||""}</p>

</div>

`;



const content=card.querySelector(".p-5");

content.appendChild(actionButton(matchId,isLive));



container.appendChild(card);

});

})

.catch(()=>{

document.getElementById("matches-container").innerHTML=

"<p class='text-center col-span-3 text-gray-400'>Failed to load matches</p>";

});

</script>



</body>
</html>
